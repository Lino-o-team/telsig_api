name: Deploy to O2switch

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Build project
      run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Deploy to O2switch
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.O2SWITCH_HOST }}
        username: ${{ secrets.O2SWITCH_USERNAME }}
        key: ${{ secrets.O2SWITCH_SSH_KEY }}
        port: ${{ secrets.O2SWITCH_PORT }}
        script: |
          # Aller dans le répertoire du projet
          cd ${{ secrets.O2SWITCH_PROJECT_PATH }}
          
          # Sauvegarder les variables d'environnement
          if [ -f .env ]; then
            cp .env .env.backup
          fi
          
          # Récupérer les dernières modifications
          git fetch origin
          git reset --hard origin/main
          
          # Restaurer les variables d'environnement
          if [ -f .env.backup ]; then
            mv .env.backup .env
          fi
          
          # Installer les dépendances
          npm ci --only=production
          
          # Construire le projet
          npm run build
          
          # Redémarrer le service PM2
          pm2 restart telsig-mail-server || pm2 start dist/index.js --name telsig-mail-server
          
          # Sauvegarder la configuration PM2
          pm2 save
          
          echo "Déploiement terminé avec succès !" 